# YAM MuJoCo Simulation driven by Quest 3 / 3S VR controllers.
#
# No physical leader device required. Control the arm by moving the
# Quest controller in space (hold trigger to engage, A=close gripper,
# B=open gripper).
#
# ── Prerequisites ──────────────────────────────────────────────────────
#
#   Install the quest_vr optional dependency:
#     source .venv/bin/activate && uv pip install vuer
#
#   WebXR requires HTTPS. Start an ngrok tunnel:
#     ngrok http 8012
#
#   Then open the ngrok HTTPS URL in the Quest browser.
#
# ── Usage ──────────────────────────────────────────────────────────────
#
#   uv run python robots_realtime/envs/launch.py \
#       --config-path configs/yam/yam_quest_mujoco_sim.yaml
#

_target_: robots_realtime.envs.launch.LaunchConfig
sim_mode: true
hz: 50.0

robots:
  left:
    _target_: robots_realtime.robots.mujoco_sim_robot.MujocoSimRobot
    xml_path: "dependencies/i2rt/i2rt/robot_models/yam/yam.xml"
    render: true
    camera_obs: true
    camera_width: 640
    camera_height: 480
    camera_pos: [0.6, -0.3, 0.6]
    camera_lookat: [0.0, 0.0, 0.15]

agent:
  _target_: robots_realtime.agents.teleoperation.quest_vr_agent.QuestVRAgent
  bimanual: false
  vuer_port: 8012
  position_scale: 1.0
  smoothing_omega: 12.0
  smoothing_alpha: 0.3
  max_joint_vel: 2.0
  danger_zone_margin: 0.10
  deadzone_m: 0.002
  track_orientation: true
  stream_camera: true
  camera_key: "sim_camera"
  stream_fps: 30.0
  stream_quality: 80
